
<!DOCTYPE html><html><body>
<h1>Login</h1>
<form id="login">
<input id="user" placeholder="username"><br>
<input id="pass" placeholder="password" type="password"><br>
<button type="submit">Get JWT</button>
</form>
<script>
document.getElementById('login').addEventListener('submit',e=>{
  e.preventDefault();
  // placeholder
  localStorage.setItem('finny_token','demo.jwt.token');
  alert('Token stored (demo)');
});
</script>
</body></html>
