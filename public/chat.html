
<!DOCTYPE html><html><body>
<h1>Finny Chat</h1>
<textarea id="q"></textarea>
<button onclick="ask()">Ask</button>
<pre id="out"></pre>
<script>
async function ask(){
  const token = localStorage.getItem('finny_token');
  const res = await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({q:document.getElementById('q').value})});
  document.getElementById('out').textContent = await res.text();
}
</script>
</body></html>
